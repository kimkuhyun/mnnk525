# POLARIS 3-DB 스택 (MariaDB + Qdrant + Neo4j)
# 백엔드/프론트는 제외 — 서버 배포 시 git에서 받아 별도 기동.
# 데이터 적재는 pola CLI 로.
#
# 기동:  docker compose up -d
# 종료:  docker compose down            (볼륨 유지)
name: polaris

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-polaris_root_dev_only}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-polaris}
      MARIADB_USER: ${MARIADB_USER:-polaris}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-polaris_dev_only}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports: ["3307:3306"]
    volumes: ["mariadb_data:/var/lib/mysql"]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  neo4j:
    image: neo4j:5.24-community
    restart: unless-stopped
    hostname: neo4j          # 컨테이너가 자기 호스트네임을 해소 못 해 기동 실패하는 문제 방지(/etc/hosts)
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-polaris_dev_only}"
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]

volumes:
  mariadb_data:
  qdrant_data:
  neo4j_data:
