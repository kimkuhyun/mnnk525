###############################################################################
# POLARIS 3 DB 스택 — Qdrant · Neo4j · MariaDB
#
# 가동:    docker compose --env-file .env up -d
# 헬스:    docker compose ps
# 중단:    docker compose down            (볼륨 유지)
# 초기화:  docker compose down -v          (볼륨 삭제 — 데이터 영구 손실)
#
# 모든 비밀·포트는 .env 로 분리 (재현성 + 보안). .env.example 복사 후 수정.
###############################################################################

services:

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: polaris-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"   # REST
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      # 컨테이너 안에 curl/wget 이 없을 수 있어 bash 의 /dev/tcp 사용 (간단·이식성 ↑)
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333' >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  neo4j:
    image: neo4j:5.24-community
    container_name: polaris-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"    # Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"    # Bolt
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-polaris_dev_only}"
      # 메모리 (시연 규모 — 운영 확장 시 조정)
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512M
      # APOC core (선택 — entity linking 등에 유용)
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mariadb:
    image: mariadb:11
    container_name: polaris-mariadb
    restart: unless-stopped
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-polaris_root_dev_only}"
      MARIADB_DATABASE: "${MARIADB_DATABASE:-polaris}"
      MARIADB_USER: "${MARIADB_USER:-polaris}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD:-polaris_dev_only}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mariadb-admin ping -h127.0.0.1 -uroot
          -p"${MARIADB_ROOT_PASSWORD:-polaris_root_dev_only}" >/dev/null 2>&1
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  mariadb_data:

###############################################################################
# 참고:
# - Ollama (bge-m3 임베딩 + qwen3.5:9b LLM) 는 호스트에 별도 설치된 채로 사용
#   (포트 11434). 임베딩·요약 스크립트는 host.docker.internal 또는 localhost
#   로 접근.
# - 새 레포 패키지화 시 ollama 컨테이너 옵션도 함께 제공 가능 (별도 compose
#   override 권장 — GPU 유무에 따라 다름).
###############################################################################
