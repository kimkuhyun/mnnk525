# Organization alias 사전 — 의미 그래프 entity linking 의 1차 매칭원.
#
# 형식:
#   "<corp_code 8자리>":
#     name: 정식명
#     aliases: [...]              # 추가 표기 (티커·약어·영문 등)
#     ticker: [...]               # KRX 종목코드
#     ambiguous_alone: [...]      # 단독 매칭 차단 (예: "삼성"만 → 그룹 vs 전자 모호)
#     subsidiaries: [...]         # 자회사 (별도 corp_code 매핑은 옵션)
#
# 신규 회사 추가 시: corp_code → name + aliases 블록만 추가.

